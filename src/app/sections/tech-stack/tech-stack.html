<div class="content-width">
  <div class="max-w-2xl space-y-4">
    <div class="space-y-3">
      <h2 class="font-heading text-3xl font-medium tracking-tighter text-foreground sm:text-[2.2rem]">
        Tech Stack
      </h2>
      <p class="max-w-2xl text-[0.98rem] leading-8 text-muted-foreground sm:text-[1.02rem]">
        Tools I use to build personal projects and academic projects.
      </p>
    </div>
  </div>

  <div class="mt-10">
    <div class="grid gap-8 md:grid-cols-2">
      <section class="border-t border-border/60 pt-5">
        <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">Languages</p>

        <div class="mt-4 flex flex-wrap gap-2">
          <span [class]="tagClass">TypeScript</span>
          <span [class]="tagClass">JavaScript</span>
          <span [class]="tagClass">HTML</span>
          <span [class]="tagClass">CSS</span>
        </div>
      </section>

      <section class="border-t border-border/60 pt-5">
        <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">Frontend</p>

        <div class="mt-4 flex flex-wrap gap-2">
          <span [class]="tagClass">Angular</span>
          <span [class]="tagClass">React</span>
          <span [class]="tagClass">Ionic</span>
          <span [class]="tagClass">Tailwind CSS</span>
        </div>
      </section>

      <section class="border-t border-border/60 pt-5">
        <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">Backend</p>

        <div class="mt-4 flex flex-wrap gap-2">
          <span [class]="tagClass">REST</span>
          <span [class]="tagClass">NestJS</span>
          <span [class]="tagClass">PostgreSQL</span>
          <span [class]="tagClass">Prisma ORM</span>
        </div>
      </section>

      <section class="border-t border-border/60 pt-5">
        <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">Testing</p>

        <div class="mt-4 flex flex-wrap gap-2">
          <span [class]="tagClass">Vitest</span>
          <span [class]="tagClass">Jest</span>
        </div>
      </section>

      <section class="border-t border-border/60 pt-5">
        <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">Tools</p>

        <div class="mt-4 flex flex-wrap gap-2">
          <span [class]="tagClass">Git</span>
          <span [class]="tagClass">GitHub</span>
          <span [class]="tagClass">Figma</span>
        </div>
      </section>
    </div>
  </div>
</div>
