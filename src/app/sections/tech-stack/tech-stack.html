<div class="content-width">
  <div class="max-w-2xl space-y-4">
    <div class="space-y-3">
      <h2 class="font-heading text-3xl font-medium tracking-tighter text-foreground sm:text-[2.2rem]">
        Tech Stack
      </h2>
      <p class="max-w-2xl text-[0.98rem] leading-8 text-muted-foreground sm:text-[1.02rem]">
        Tools I use to build personal projects and academic projects.
      </p>
    </div>
  </div>

  <div class="mt-10">
    <div class="grid gap-8 md:grid-cols-2">
      @for (category of categories; track category.title) {
        <section class="border-t border-border/60 pt-5">
          <p class="font-heading text-xs font-medium tracking-wider text-muted-foreground uppercase">
            {{ category.title }}
          </p>

          <div class="mt-4 flex flex-wrap gap-2">
            @for (item of category.items; track item.name) {
              <span [class]="tagClass">
                <span
                  class="stack-icon inline-block size-3.5 shrink-0 bg-current"
                  [style.-webkit-mask-image]="'url(' + item.icon + ')'"
                  [style.mask-image]="'url(' + item.icon + ')'"
                  role="img"
                  [attr.aria-label]="item.name"
                ></span>
                {{ item.name }}
              </span>
            }
          </div>
        </section>
      }
    </div>
  </div>
</div>
